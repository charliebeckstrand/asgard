name: heimdall

services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: heimdall
            POSTGRES_PASSWORD: heimdall
            POSTGRES_DB: heimdall
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U heimdall"]
            interval: 5s
            timeout: 5s
            retries: 5

    heimdall:
        build: .
        ports:
            - "8000:8000"
        environment:
            DATABASE_URL: postgres://heimdall:heimdall@postgres:5432/heimdall
            SECRET_KEY: dev-secret-key-not-for-production
        depends_on:
            postgres:
                condition: service_healthy

volumes:
    postgres_data:
