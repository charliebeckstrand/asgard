name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to DigitalOcean
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Resolve app spec variables
        run: sed -i 's|${GITHUB_REPO}|${{ github.repository }}|g' .do/app.yaml

      - name: Get or create app
        id: app
        run: |
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header | grep yggdrasil | awk '{print $1}')
          if [ -z "$APP_ID" ]; then
            echo "Creating new app..."
            APP_ID=$(doctl apps create --spec .do/app.yaml --format ID --no-header)
          else
            echo "Updating app spec..."
            doctl apps update "$APP_ID" --spec .do/app.yaml
          fi
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy app
        run: doctl apps create-deployment ${{ steps.app.outputs.app_id }} --wait
